# Apache reverse proxy for Systems Admin Agent Web UI
# Place this in: /etc/apache2/conf.d/sysadmin-agent.conf
# or include it from the WHM Apache config.
#
# Prerequisites:
#   a2enmod proxy proxy_http proxy_wstunnel headers ssl rewrite
#
# IMPORTANT — cPanel/WHM servers:
#   cPanel manages its own IP-based vhosts. Using *:80 / *:443 will NOT match
#   correctly — requests will hit cPanel's default vhost instead. You MUST replace
#   * with your server's public IP address (e.g., 209.222.101.44:80). The setup
#   script (deploy/setup-domain.sh) handles this automatically.
#
# After placing, restart Apache:
#   apachectl configtest && apachectl graceful
#
# Troubleshooting:
#   - "Index of" or cPanel default page: VirtualHost IP:port is not matching.
#     Run `apachectl -S` and ensure your vhost uses the same IP as other vhosts.
#   - Cloudflare users: set SSL mode to "Full (Strict)" and purge cache after
#     config changes. Test directly:
#       curl -sk https://DOMAIN --resolve DOMAIN:443:SERVER_IP
#   - Verify the app is running: curl -s http://127.0.0.1:5000/ should return HTML.

<VirtualHost *:80>
    ServerName server.contois.fyi
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName server.contois.fyi

    # SSL — update paths to match your AutoSSL or Let's Encrypt cert location.
    # cPanel AutoSSL typically stores certs at:
    #   /var/cpanel/ssl/installed/certs/<domain>.crt
    #   /var/cpanel/ssl/installed/keys/<key-id>.key
    # Or use Let's Encrypt paths if using certbot:
    #   /etc/letsencrypt/live/server.contois.fyi/fullchain.pem
    #   /etc/letsencrypt/live/server.contois.fyi/privkey.pem
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/server.contois.fyi/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/server.contois.fyi/privkey.pem

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Reverse proxy to the Flask/SocketIO app on port 5000
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # WebSocket support (required for Socket.IO)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:5000/$1 [P,L]

    # Timeouts — agent operations can take a while
    ProxyTimeout 300
    TimeOut 300
</VirtualHost>
