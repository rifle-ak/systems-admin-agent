{% extends "base.html" %}
{% block title %}Login - SysAdmin Agent{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#e94560" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                <circle cx="12" cy="16" r="1"/>
            </svg>
            <h2>Authentication Required</h2>
        </div>

        {% if error %}
        <div class="login-error">
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login" class="login-form">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
